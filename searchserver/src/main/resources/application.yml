server:
  port: 8087

spring:
  application:
    name: dseum-search

  profiles:
    active: dev

  # 1. 엘라스틱서치 설정 (Spring Data Elasticsearch)
  elasticsearch:
    uris: http://elasticsearch:9200 # 도커 서비스 이름으로.
    socket-timeout: 10s
    connection-timeout: 10s
  data:
    redis:
      host: redis
      port: 6379
      password: 1234
    elasticsearch:
      repositories:
        enabled: true

  # 2. 리액티브 카프카 설정 (Spring Cloud Stream)
  cloud:
    config:
      name: dseum-search,dseum-product
      fail-fast: true # 컨피그 서버 연결 실패 시 즉시 종료 (순서 보장)
      retry:
        initial-interval: 3000
        multiplier: 1.5
        max-attempts: 10
    function:
#      definition: consumeProductEvent # 이 메서드 이름으로 이벤트를 받는다.
    stream:
      kafka:
        binder:
          brokers: kafka:9092 # 카프카 브로커 주소.
      bindings:
        consumeProductEvent-in-0: # 입력 바인딩 이름.
          destination: product-topic
          group: search-group
          content-type: application/json

    # 3. 기존 MSA 인프라 설정 (원본 유지)
    bootstrap:
      enabled: false
    compatibility-verifier:
      enabled: false
    vault:
      host: dseum-vault
      port: 8200
      scheme: http
      authentication: TOKEN
      token: eum-root
      kv:
        enabled: true
        backend: secret

  config:
    import:
      - "optional:configserver:http://configserver:8071"
      - "optional:vault://"

eureka:
  client:
    registry-fetch-interval-seconds: 30
    disable-delta: true
    serviceUrl:
      defaultZone: http://eurekaserver:8070/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus" # 💡 밖으로 내보낼 통로

  # 💡 각 엔드포인트별로 접근 권한을 미세 조정합니다.
  endpoint:
    health:
      access: read_only   # 상세 정보 읽기 전용
      show-details: always
    prometheus:
      access: read_only   # 프로메테우스 수집용 데이터 읽기 전용
    info:
      access: read_only

  metrics:
    tags:
      application: ${spring.application.name} # 서버 이름표 (인식표) 필수!

  tracing:
    sampling:
      # 💡 1.0 = 모든 요청을 100% 추적 (개발 중에는 무결성을 위해 1.0 권장)
      # 운영 중에는 9060XT급 부하를 줄이기 위해 0.1(10%) 정도로 조절합니다.
      probability: 1.0
    zipkin:
      tracing:
        # 💡 도커 컴포즈에 설정한 zipkin-server 주소와 포트
        endpoint: "http://zipkin-server:9411/api/v2/spans"
