spring:
  application:
    name: ragserver
  profiles:
    default: local
  elasticsearch:
    uris: ${RAG_ELASTICSEARCH_URIS:http://localhost:9200}
  data:
    redis:
      host: ${RAG_REDIS_HOST:localhost}
      port: ${RAG_REDIS_PORT:6379}
      password: ${RAG_REDIS_PASSWORD:}

server:
  port: ${RAG_SERVER_PORT:8099}

logging:
  level:
    root: INFO
    com.eum.rag: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8070/eureka/}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

rag:
  ai:
    base-url: ${RAG_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
    api-key: ${GEMINI_API_KEY:}
    chat-model: ${RAG_GEMINI_CHAT_MODEL:gemini-2.5-flash-lite}
    embedding-model: ${RAG_GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    embedding-dimension: ${RAG_EMBEDDING_DIMENSION:1536}
    connect-timeout-ms: ${RAG_AI_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${RAG_AI_READ_TIMEOUT_MS:5000}
    retry-max-attempts: ${RAG_AI_RETRY_MAX_ATTEMPTS:2}
  retrieval:
    top-k: ${RAG_RETRIEVAL_TOP_K:5}
    candidate-multiplier: ${RAG_RETRIEVAL_CANDIDATE_MULTIPLIER:4}
    rrf-k: ${RAG_RETRIEVAL_RRF_K:60}
    index-name: ${RAG_ELASTICSEARCH_INDEX:rag-chunks-v1}
  session:
    ttl-hours: ${RAG_SESSION_TTL_HOURS:24}
    max-messages: ${RAG_SESSION_MAX_MESSAGES:20}
  async:
    core-pool-size: ${RAG_ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${RAG_ASYNC_MAX_POOL_SIZE:8}
    queue-capacity: ${RAG_ASYNC_QUEUE_CAPACITY:200}
    thread-name-prefix: rag-async-
  document:
    chunk-size: ${RAG_DOCUMENT_CHUNK_SIZE:320}
    chunk-min-size: ${RAG_DOCUMENT_CHUNK_MIN_SIZE:180}
    chunk-max-size: ${RAG_DOCUMENT_CHUNK_MAX_SIZE:480}
    chunk-overlap-ratio: ${RAG_DOCUMENT_CHUNK_OVERLAP_RATIO:0.15}
    metadata-ttl-days: ${RAG_DOCUMENT_METADATA_TTL_DAYS:7}
    reindex-lock-wait-seconds: ${RAG_REINDEX_LOCK_WAIT_SECONDS:5}
    reindex-lock-ttl-seconds: ${RAG_REINDEX_LOCK_TTL_SECONDS:30}
    bootstrap:
      enabled: ${RAG_OPENBOOK_BOOTSTRAP_ENABLED:true}
      file-path: ${RAG_OPENBOOK_BOOTSTRAP_FILE_PATH:ragserver/docs/petfood-openbook-upload-ready.pdf}
      document-id: ${RAG_OPENBOOK_DOCUMENT_ID:petfood-openbook}
      category: ${RAG_OPENBOOK_CATEGORY:NOTICE}
  chat:
    max-sources: ${RAG_CHAT_MAX_SOURCES:3}
    rewrite-short-question-length: ${RAG_CHAT_REWRITE_SHORT_QUESTION_LENGTH:14}
    llm-temperature: ${RAG_CHAT_LLM_TEMPERATURE:0}

resilience4j:
  circuitbreaker:
    instances:
      geminiApi:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      geminiApi:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
