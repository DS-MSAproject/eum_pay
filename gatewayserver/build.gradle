jib {
    from {
        // Dockerfileмқҳ FROM eclipse-temurin:17-jdkмҷҖ лҸҷмқј
        image = 'eclipse-temurin:17-jdk'
    }
    to {
        // dseum/productserver:0.0.1-SNAPSHOT нҳ•нғң
        image = "dseum/${project.name}"
        tags = ["${project.version}", 'latest']
    }
    container {
        // Dockerfileмқҳ ENTRYPOINT м„Өм • мһҗлҸҷнҷ”
        // JibлҠ” м•Ңм•„м„ң lib, meta-inf, classesлҘј л¶„лҰ¬н•ҳм—¬ нҒҙлһҳмҠӨнҢЁмҠӨлҘј кө¬м„ұн•Ё
        mainClass = 'com.eum.gatewayserver.ApiGatewayServerApplication'

        // Dockerfileмқҳ VOLUME /tmp
        volumes = ['/tmp']

        // Dockerfileмқҳ LABEL maintainer
        labels = [maintainer: 'dseum-gateway <lisepa7@gmail.com>']

        // нҷҳкІҪ м„Өм • л°Ҹ мқёмҪ”л”©
        jvmFlags = ['-Dfile.encoding=UTF-8', '-server']

        // л№Ңл“ң мӢңк°„мқ„ нҳ„мһ¬лЎң м„Өм •
        creationTime = 'USE_CURRENT_TIMESTAMP'
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
