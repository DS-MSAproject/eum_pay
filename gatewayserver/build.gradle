plugins {
    id 'java'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
    // id 'com.palantir.docker' version '0.35.0'
    id 'com.google.cloud.tools.jib' version '3.4.1'
}

group = 'com.eum'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

ext {
    set('springCloudVersion', "2025.0.1")
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // [м¶”к°Җ] cd ліҙм•Ҳ м„Өм •
    implementation 'org.springframework.boot:spring-boot-starter-security'

    implementation 'org.json:json:20231013'

    //== Spring Cloud ==//
    implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap'
    implementation 'org.springframework.cloud:spring-cloud-starter-config'
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway'
    implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // [м¶”к°Җ] лҰ¬м•ЎнӢ°лёҢ ліҙм•Ҳ н…ҢмҠӨнҠё
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    implementation 'io.jsonwebtoken:jjwt-api:0.12.6' // authserver лІ„м „кіј л§һм¶Ө
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Redis (лё”лһҷлҰ¬мҠӨнҠё нҷ•мқё)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // JSON нҢҢмӢұ (JWKS лЎңл”©)
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    // Rate Limiting (Gateway м„ңлІ„м—җ м¶”к°Җ)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // Vault м„ңлІ„
    implementation 'org.springframework.cloud:spring-cloud-starter-vault-config'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

