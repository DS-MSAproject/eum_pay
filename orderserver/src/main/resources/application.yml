spring:
  application:
    name: dseum-order

  config:
    import:
      - "optional:vault://"
      - "optional:configserver:${CONFIGSERVER_URI:http://configserver:8071}"

  cloud:
    compatibility-verifier:
      enabled: false
    vault:
      host: ${VAULT_HOST:dseum-vault}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: TOKEN
      token: ${VAULT_TOKEN:eum-root}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}
    function:
      definition: "inventoryReservedConsumer;inventoryReservationFailedConsumer;paymentCompletedConsumer;paymentFailedConsumer;inventoryDeductedConsumer;inventoryDeductionFailedConsumer;inventoryReleasedConsumer;inventoryReleaseFailedConsumer"
    stream:
      instance-count: ${STREAM_INSTANCE_COUNT:1}
      instance-index: ${STREAM_INSTANCE_INDEX:0}
      default:
        contentType: application/json
      bindings:
        inventoryReservedConsumer-in-0:
          destination: InventoryReserved
          group: dseum-order-inventory-reserved
          consumer:
            partitioned: true
        inventoryReservationFailedConsumer-in-0:
          destination: InventoryReservationFailed
          group: dseum-order-inventory-reservation-failed
          consumer:
            partitioned: true
        paymentCompletedConsumer-in-0:
          destination: PaymentCompleted
          group: dseum-order-payment-completed
          consumer:
            partitioned: true
        paymentFailedConsumer-in-0:
          destination: PaymentFailed
          group: dseum-order-payment-failed
          consumer:
            partitioned: true
        inventoryDeductedConsumer-in-0:
          destination: InventoryDeducted
          group: dseum-order-inventory-deducted
          consumer:
            partitioned: true
        inventoryDeductionFailedConsumer-in-0:
          destination: InventoryDeductionFailed
          group: dseum-order-inventory-deduction-failed
          consumer:
            partitioned: true
        inventoryReleasedConsumer-in-0:
          destination: InventoryReleased
          group: dseum-order-inventory-released
          consumer:
            partitioned: true
        inventoryReleaseFailedConsumer-in-0:
          destination: InventoryReleaseFailed
          group: dseum-order-inventory-release-failed
          consumer:
            partitioned: true
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092,kafka2:9092,kafka3:9092}
        bindings:
          inventoryReservedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          inventoryReservationFailedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          paymentCompletedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          paymentFailedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          inventoryDeductedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          inventoryDeductionFailedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          inventoryReleasedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          inventoryReleaseFailedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eurekaserver:8070/eureka/

# 프로메테우스 설정
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

  endpoint:
    health:
      access: read_only
      show-details: always
    prometheus:
      access: read_only

  metrics:
    tags:
      # 💡 위에서 설정한 고유한 name을 자동으로 물고 들어갑니다. (무결성 포인트)
      application: ${spring.application.name}
  tracing:
    sampling:
      # 💡 1.0 = 모든 요청을 100% 추적 (개발 중에는 무결성을 위해 1.0 권장)
      # 운영 중에는 9060XT급 부하를 줄이기 위해 0.1(10%) 정도로 조절합니다.
      probability: 1.0
    zipkin:
      tracing:
        # 💡 도커 컴포즈에 설정한 zipkin-server 주소와 포트
        endpoint: "http://zipkin-server:9411/api/v2/spans"
