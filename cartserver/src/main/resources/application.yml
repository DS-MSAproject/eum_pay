spring:
  application:
    name: dseum-cart
  config:
    import:
      - "optional:configserver:${CONFIGSERVER_URI:http://configserver:8071}"
      - "optional:vault://"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-migration-naming: true

  cloud:
    compatibility-verifier:
      enabled: false
    function:
      definition: orderCheckedOutConsumer;paymentCompletedConsumer;paymentFailedConsumer;orderCancelledConsumer
    stream:
      default:
        contentType: application/json
      bindings:
        orderCheckedOutConsumer-in-0:
          destination: OrderCheckedOut
          group: dseum-cart-order-checked-out
        paymentCompletedConsumer-in-0:
          destination: PaymentCompleted
          group: dseum-cart-payment-completed
        paymentFailedConsumer-in-0:
          destination: PaymentFailed
          group: dseum-cart-payment-failed
        orderCancelledConsumer-in-0:
          destination: OrderCancelled
          group: dseum-cart-order-cancelled
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092,kafka2:9092,kafka3:9092}
        bindings:
          orderCheckedOutConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          paymentCompletedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          paymentFailedConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
          orderCancelledConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-partitions: 1
              auto-commit-on-error: true
    vault:
      host: ${VAULT_HOST:dseum-vault}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: TOKEN
      token: ${VAULT_TOKEN:eum-root}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}

eureka:
  client:
    serviceUrl:
      defaultZone: http://eurekaserver:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      access: read_only
      show-details: always
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    zipkin:
      tracing:
        endpoint: "http://zipkin-server:9411/api/v2/spans"
