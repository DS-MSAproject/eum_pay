spring:
  application:
    name: dseum-cart
  config:
    import:
      - "optional:configserver:${CONFIGSERVER_URI:http://configserver:8071}"
      - "optional:vault://"

  cloud:
    compatibility-verifier:
      enabled: false
    vault:
      host: ${VAULT_HOST:dseum-vault}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: TOKEN
      token: ${VAULT_TOKEN:eum-root}
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}

eureka:
  client:
    serviceUrl:
      defaultZone: http://eurekaserver:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      access: read_only
      show-details: always
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    zipkin:
      tracing:
        endpoint: "http://zipkin-server:9411/api/v2/spans"
