input {
  # 1. DB 변경분 수집 (Kafka)
  kafka {
    bootstrap_servers => "kafka:9092,kafka2:9092,kafka3:9092"
    topics => ["asgard.public.products", "asgard.public.notices", "asgard.public.faq", "reviewdb.public.reviews"]
    group_id => "asgard-logstash-v5" # 💡 새로운 그룹 ID로 시작 권장
    codec => "json"
    consumer_threads => 1
    decorate_events => true
    auto_offset_reset => "earliest"
  }

  # 2. 검색 통계 로그 수집
  tcp {
    port => 5000
    codec => "json"
    add_field => { "source_type" => "app_log" }
  }
}

filter {
  # --- A. 검색 통계 로그 처리 ---
  if [message] =~ "SEARCH_METRIC:" {
    dissect { mapping => { "message" => "SEARCH_METRIC: %{json_payload}" } }
    json {
      source => "json_payload"
      target => "search_event"
      remove_field => ["json_payload", "message"]
    }
    mutate {
      add_field => { "[@metadata][target_index]" => "search_history" }
      add_tag => ["search_stat"]
    }
  }

  # --- B. DB 동기화 처리 ---
  else if [@metadata][kafka][topic] {
    mutate { add_field => { "[@metadata][target_index]" => "%{[@metadata][kafka][topic]}" } }

    if [@metadata][kafka][topic] == "reviewdb.public.reviews" {
      mutate { replace => { "[@metadata][target_index]" => "asgard.public.reviews" } }
    }

    if [payload] {
      if [payload][op] in ["c", "u", "r"] {

        # upsert 문서 ID를 명시적으로 지정합니다.
        # 테이블마다 PK 필드명이 달라서 우선순위로 탐색합니다.
        ruby {
          code => "
            keys = ['id', 'product_id', 'notice_id', 'faq_id', 'review_id']
            after = event.get('[payload][after]') || {}
            doc_id = nil
            keys.each do |k|
              v = after[k]
              if !v.nil? && v.to_s.strip.length > 0
                doc_id = v
                break
              end
            end
            event.set('id', doc_id) if doc_id
          "
        }

        # 💡 [보정 1] 날짜 단위 변환 (Micro -> Milli)
        ruby {
          code => "
            if event.get('[payload][after][created_at]')
              micro = event.get('[payload][after][created_at]').to_i
              event.set('[payload][after][created_at]', micro / 1000)
            end
            if event.get('[payload][after][updated_at]')
              micro_up = event.get('[payload][after][updated_at]').to_i
              event.set('[payload][after][updated_at]', micro_up / 1000)
            end
          "
        }

        # 💡 [보정 2] JSONB 문자열 복구
        if [payload][after][content_image_urls] {
          json {
            source => "[payload][after][content_image_urls]"
            target => "[payload][after][content_image_urls]"
          }
        }
        if [payload][after][actions] {
          json {
            source => "[payload][after][actions]"
            target => "[payload][after][actions]"
          }
        }

        # 💡 [보정 3] 필드 최상위 전개 (Rename 없이 원본 필드명 유지)
        # 이 과정에서 DB의 'is_pinned' 등이 그대로 ES 필드로 저장됩니다.
        ruby {
          code => "
            event.get('[payload][after]').each do |k, v|
              event.set(k, v)
            end
          "
        }

        # ❌ 명시적 Rename 로직 제거
        # 이유: ES 매핑 파일(mappings.json)이 snake_case로 작성되어 있으므로 일치시켜야 함.
      }
      else if [payload][op] == "d" {
        ruby {
          code => "
            keys = ['id', 'product_id', 'notice_id', 'faq_id', 'review_id']
            before = event.get('[payload][before]') || {}
            doc_id = nil
            keys.each do |k|
              v = before[k]
              if !v.nil? && v.to_s.strip.length > 0
                doc_id = v
                break
              end
            end
            event.set('id', doc_id) if doc_id
          "
        }
        mutate { add_tag => ["deleted"] }
      }
    }

    mutate { remove_field => ["payload", "schema", "@version", "@timestamp", "event", "transaction"] }
  }
}

output {
  if "search_stat" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "search_history"
      action => "index"
    }
  }
  else if "deleted" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "%{[@metadata][target_index]}"
      action => "delete"
      document_id => "%{id}"
    }
  } else if [@metadata][target_index] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "%{[@metadata][target_index]}"
      action => "update"
      doc_as_upsert => true
      document_id => "%{id}"
    }
  }
  stdout { codec => rubydebug }
}
