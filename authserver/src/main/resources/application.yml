server:
  port: 8090
  forward-headers-strategy: framework

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9093}

spring:
  application:
    name: authserver

  datasource:
    url: jdbc:postgresql://database:5432/dseum
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: redis
      port: 6379
      password: 1234

  mail:
    host: smtp.gmail.com
    port: 587
    username: ksyboy1234@gmail.com
    password: hdtsnigvphinbjgb
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "495472949000-oe83sb0uakevljgiiv09pnfmlp8kkuve.apps.googleusercontent.com"
            client-secret: "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"
            redirect-uri: "https://localhost:8072/api/v1/login/oauth2/code/google"
            scope:
              - profile
              - email

          naver:
            client-id: "hyJ03rRU6QhEkwLEjuqx"
            client-secret: "ZWxetki49_"
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "https://localhost:8072/api/v1/login/oauth2/code/naver"
            scope:
              - name
              - email
              - mobile        # 전화번호 추가 (네이버 동의항목에서도 활성화 필요)
              - profile_image # 프로필 사진

          kakao:
            client-id: "d6f97e25ea1812d5a2d77c54bd7bf8ce"
            client-secret: "SgcGXLw3tTrA9kn6KndQSpwkunXx43qo"
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post  # 카카오는 POST 방식 필수
            redirect-uri: "https://localhost:8072/api/v1/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - profile_image
              - account_email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id  # 카카오는 id가 최상위 식별자

eureka:
  client:
    service-url:
      defaultZone: http://eurekaserver:8070/eureka/

jwt:
  access-token-expire: 900000
  refresh-token-expire: 604800000

vault:
  enabled: true
  uri: http://dseum-vault:8200
  token: eum-root
  path: secret/auth/rsa

app:
  frontend-url: https://localhost:5173
  cookie:
    secure: true
    same-site: Lax   #http활성화시 Strict 적용

# 프로메테우스 설정
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

  endpoint:
    health:
      access: read_only
      show-details: always
    prometheus:
      access: read_only
  health:
    mail:
      enabled: false

  metrics:
    tags:
      # 💡 위에서 설정한 고유한 name을 자동으로 물고 들어갑니다. (무결성 포인트)
      application: ${spring.application.name}
  tracing:
    sampling:
      # 💡 1.0 = 모든 요청을 100% 추적 (개발 중에는 무결성을 위해 1.0 권장)
      # 운영 중에는 9060XT급 부하를 줄이기 위해 0.1(10%) 정도로 조절합니다.
      probability: 1.0
    zipkin:
      tracing:
        # 💡 도커 컴포즈에 설정한 zipkin-server 주소와 포트
        endpoint: "http://zipkin-server:9411/api/v2/spans"
